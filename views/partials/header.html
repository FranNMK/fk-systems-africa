<!-- views/partials/header.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><%= title || 'FK Systems Africa' %></title>
    
    <!-- Tailwind CSS CDN with Brand Color Configuration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0B2545',
                        gold: '#C9922E',
                        green: '#1E6F46',
                        gray: '#5A5A5A'
                    }
                }
            }
        }
    </script>

    <!-- Link to your external custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-white text-gray-800 antialiased font-sans flex flex-col min-h-screen">

    <!-- Navbar -->
    <header class="bg-navy shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 reveal">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center">
                    <a href="/" class="text-2xl font-bold text-white tracking-tight flex items-center gap-2">
                        <img src="/images/logo.png" alt="FK Systems Africa" class="h-10 w-auto" onerror="this.style.display='none'"> 
                        <span class="text-gold">FK</span> <span class="font-light text-white">Systems</span>
                    </a>
                </div>
                <nav class="hidden md:flex space-x-8">
                    <a href="/" class="text-white hover:text-gold transition-colors font-medium">Home</a>
                    <a href="/services" class="text-white hover:text-gold transition-colors font-medium">Services</a>
                    <a href="/solutions" class="text-white hover:text-gold transition-colors font-medium">Our Work</a>
                    <a href="/events" class="text-white hover:text-gold transition-colors font-medium">Events</a>
                    <a href="/training" class="text-white hover:text-gold transition-colors font-medium">Training</a>
                    <a href="/about" class="text-white hover:text-gold transition-colors font-medium">About</a>
                    <a href="/contact" class="bg-gold text-navy px-4 py-2 rounded hover:bg-yellow-500 transition-colors font-semibold">Contact</a>
                </nav>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-white hover:text-gold focus:outline-none" aria-expanded="false" aria-controls="mobile-menu">
                        <svg id="menu-icon-open" class="h-6 w-6 block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                        <svg id="menu-icon-close" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-navy border-t border-gray-700">
            <div class="px-4 pt-2 pb-6 space-y-2">
                <a href="/" class="block text-white hover:text-gold px-3 py-2 rounded text-base font-medium">Home</a>
                <a href="/services" class="block text-white hover:text-gold px-3 py-2 rounded text-base font-medium">Services</a>
                <a href="/solutions" class="block text-white hover:text-gold px-3 py-2 rounded text-base font-medium">Our Work</a>
                <a href="/events" class="block text-white hover:text-gold px-3 py-2 rounded text-base font-medium">Events</a>
                <a href="/training" class="block text-white hover:text-gold px-3 py-2 rounded text-base font-medium">Training</a>
                <a href="/about" class="block text-white hover:text-gold px-3 py-2 rounded text-base font-medium">About</a>
                <a href="/contact" class="block bg-gold text-navy text-center px-3 py-2 rounded text-base font-bold mt-2">Contact</a>
            </div>
        </div>
    </header>
    <main>
