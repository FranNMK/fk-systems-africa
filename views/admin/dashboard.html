<!-- views/admin/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><%= title %></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0B2545',
                        gold: '#C9922E',
                        green: '#1E6F46'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Admin Navbar -->
    <nav class="bg-navy text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
            <span class="text-lg font-bold text-gold">FK Admin Panel</span>
            <div class="flex items-center space-x-6">
                <span class="text-sm hidden sm:block">Welcome, <%= adminName %></span>
                <a href="/admin/logout" class="text-sm bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded transition">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <h1 class="text-3xl font-bold text-navy mb-8">Overview</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-navy">
                <p class="text-sm text-gray-500 font-medium">Total Projects</p>
                <p class="text-3xl font-bold text-navy mt-1"><%= stats.projects || 0 %></p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-gold">
                <p class="text-sm text-gray-500 font-medium">Upcoming Events</p>
                <p class="text-3xl font-bold text-navy mt-1"><%= stats.upcomingEvents || 0 %></p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green">
                <p class="text-sm text-gray-500 font-medium">Unread Messages</p>
                <p class="text-3xl font-bold text-navy mt-1"><%= stats.unreadMessages || 0 %></p>
            </div>
        </div>

        <div class="mt-8 text-center text-gray-500 text-sm">
            <p>Modules 7 & 8 (CRUD for Services, Projects, Events) will go here next.</p>
        </div>
    </div>
</body>
</html>
